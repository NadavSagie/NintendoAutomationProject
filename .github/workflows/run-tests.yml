name: Run Nintendo Tests

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: "Pytest path to run"
        required: false
        default: "tests/test_master.py"
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Set test path
        id: test_path
        run: |
          if [ -n "${{ github.event.inputs.test_path }}" ]; then
            echo "value=${{ github.event.inputs.test_path }}" >> $GITHUB_OUTPUT
          else
            echo "value=tests/test_master.py" >> $GITHUB_OUTPUT
          fi

      - name: Run selected tests
        env:
          CI: "true"
        run: |
          pytest ${{ steps.test_path.outputs.value }} --alluredir=allure-results
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload screenshots and videos if exist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results
            screenshots
            videos
          if-no-files-found: ignore